version: '3.8'

services:
  # Database
  postgres:
    image: postgres:15-alpine
    container_name: education_postgres
    environment:
      POSTGRES_DB: education_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Django Service
  backend:
    build: ./backend
    container_name: education_backend
    volumes:
      - ./backend:/app
      - media_files:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DB_HOST=postgres
      - DB_NAME=education_platform
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"

  # Frontend Next.js Service
  frontend:
    build: ./frontend
    container_name: education_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - NEXT_PUBLIC_APP_NAME=Education Platform
      - NEXT_PUBLIC_UPLOAD_URL=http://localhost:8000/media
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
  media_files: